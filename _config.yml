title: luckystar space
description: null
url: "https://starfading.github.io"

# =====================
# THEME（核心）
# =====================
remote_theme: mmistakes/minimal-mistakes@4.28.0

# =====================
# PLUGINS（必须）
# =====================
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

# =====================
# 博客基础设置
# =====================
markdown: kramdown
highlighter: rouge

# =====================
# Minimal Mistakes 外观设置
# =====================
minimal_mistakes_skin: "default"   # 可改：air / dark / mint / neon / contrast 等

paginate: 5
paginate_path: /page:num


author:
  name: "songxingchen"
  avatar: "/assets/images/avatar.jpg"
  bio: "华为裸辞ing"
  location: "Shanghai"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/starfading"

defaults:
  - scope:
      path: ""
    values:
      author_profile: true

show_excerpts: true

